<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POSB — Pay & Transfer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="sidebar" class="sidebar"></div>

<div class="main">
  <div id="topbar" class="topbar"></div>

  <div class="content" style="display:grid; grid-template-columns:1fr 340px; gap:18px; align-content:start;">

    <!-- LEFT: Recipients & Billers -->
    <div class="card">

      <div class="rec-header">
        <h3>Your Recipients &amp; Billers</h3>
        <!-- Search -->
        <div class="search-box" style="margin-bottom:0;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="recSearch" placeholder="Search your list by name" oninput="searchRec(this.value)">
        </div>
      </div>

      <!-- Tabs -->
      <div class="rec-tabs" id="recTabsBar">
        <div class="rec-tab active" onclick="setRecTab(this,'recent')">
          Recent <span class="count" id="cntRecent">0</span>
        </div>
        <div class="rec-tab" onclick="setRecTab(this,'all')">
          All <span class="count" id="cntAll">0</span>
        </div>
        <div class="rec-tab" onclick="setRecTab(this,'favourites')">
          Favourites <span class="count" id="cntFav">0</span>
        </div>
      </div>

      <!-- Add row -->
      <div class="add-recipient-row" onclick="location.href='recipients.html'">
        <div class="add-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
        <span>Add a recipient or bill</span>
      </div>

      <!-- Section label -->
      <div class="section-label" id="recSectionLabel">Recent transfers</div>

      <!-- List -->
      <div id="recList"></div>

    </div>

    <!-- RIGHT: Services -->
    <div style="display:flex; flex-direction:column; gap:18px;">

      <!-- Services grid -->
      <div class="card">
        <div style="padding:18px 18px 0; font-size:15px; font-weight:600;">Services</div>
        <div class="services-grid">

          <!-- Row 1 -->
          <div class="service-item" onclick="location.href='transfer.html'">
            <div class="service-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                <path d="M8 12h8M12 8v8"/>
              </svg>
            </div>
            <div class="service-label">PayNow</div>
          </div>

          <div class="service-item" onclick="location.href='transfer.html'">
            <div class="service-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="8" width="18" height="12" rx="2"/><path d="M7 8V6a5 5 0 0 1 10 0v2"/>
              </svg>
            </div>
            <div class="service-label">Local transfer</div>
          </div>

          <div class="service-item" onclick="location.href='transfer.html'">
            <div class="service-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
              </svg>
            </div>
            <div class="service-label">Overseas transfer</div>
          </div>

          <div class="service-item" onclick="location.href='transfer.html'">
            <div class="service-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
            </div>
            <div class="service-label">Scheduled transfer</div>
          </div>

          <!-- Row 2 -->
          <div class="service-item">
            <div class="service-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/>
              </svg>
            </div>
            <div class="service-label">Bills, Cards &amp; GIRO</div>
          </div>

          <div class="service-item">
            <div class="service-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
              </svg>
            </div>
            <div class="service-label">Top-ups &amp; cheques</div>
          </div>

          <div class="service-item">
            <div class="service-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
            </div>
            <div class="service-label">Manage limits</div>
          </div>

          <div class="service-item">
            <div class="service-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
              </svg>
            </div>
            <div class="service-label">iB Cheque &amp; Demand Draft</div>
          </div>

        </div>
      </div>

      <!-- Quick Transfer -->
      <div class="card" style="padding:18px 20px;">
        <div style="font-size:14px;font-weight:600;margin-bottom:12px;">Quick Transfer</div>
        <div class="amount-field-wrap" style="margin-bottom:12px;">
          <span class="currency-prefix">SGD</span>
          <input class="amount-inp" id="quickAmt" type="number" placeholder="0.00" min="0">
        </div>
        <button class="send-btn" onclick="quickTransfer()">Send Now →</button>
      </div>

    </div>
  </div>

  <div class="page-footer" id="pageFooter"></div>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
<script>
  checkLogin();
  buildSidebar("Pay & Transfer");
  buildTopbar("Pay & Transfer");
  buildFooter();

  let currentFilter = "recent";
  let allRecs = getRecipients();

  // Update counts
  function updateCounts(){
    allRecs = getRecipients();
    document.getElementById("cntAll").textContent    = allRecs.length;
    document.getElementById("cntRecent").textContent = Math.min(allRecs.length, 7);
    document.getElementById("cntFav").textContent    = allRecs.filter(r=>r.fav).length;
  }

  function setRecTab(el, type){
    document.querySelectorAll(".rec-tab").forEach(t=>t.classList.remove("active"));
    el.classList.add("active");
    currentFilter = type;
    const label = { recent:"Recent transfers", all:"All recipients", favourites:"Favourites" };
    document.getElementById("recSectionLabel").textContent = label[type] || "All";
    renderRecs(getFilteredRecs(type));
  }

  function getFilteredRecs(type){
    allRecs = getRecipients();
    if(type==="recent") return [...allRecs].sort((a,b)=>b.created-a.created).slice(0,7);
    if(type==="favourites") return allRecs.filter(r=>r.fav);
    return allRecs;
  }

  function searchRec(q){
    const lq = q.toLowerCase();
    const base = getFilteredRecs(currentFilter);
    renderRecs(lq ? base.filter(r=>r.name.toLowerCase().includes(lq)||r.acc.toLowerCase().includes(lq)) : base);
  }

  const BADGE = {
    remit:  `<span class="rec-badge badge-remit">DBS REMIT</span>`,
    paynow: `<span class="rec-badge badge-paynow">PAYNOW</span>`,
    local:  ``,
  };

  function renderRecs(list){
    const el = document.getElementById("recList");
    if(!list.length){
      el.innerHTML = `<div style="padding:28px;text-align:center;color:#9ca3af;font-size:13px;">No recipients found</div>`;
      return;
    }
    el.innerHTML = list.map((r,i)=>{
      const color = avatarColor(r.name);
      const badge = BADGE[r.type] || "";
      const favStar = r.fav
        ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="#f0a500" stroke="#f0a500" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`
        : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
      return `
        <div class="rec-row" onclick="payRecipient(${i})">
          <div class="rec-avatar" style="background:${color};">${initials(r.name)}</div>
          <div class="rec-info">
            <div class="rec-name">${r.name}</div>
            <div class="rec-sub">${r.bank}, ${r.acc}</div>
          </div>
          ${badge}
          <div class="rec-menu" onclick="event.stopPropagation(); toggleFav(${i});" title="Toggle favourite">
            ${favStar}
          </div>
          <div class="rec-menu" onclick="event.stopPropagation();">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>
            </svg>
          </div>
        </div>`;
    }).join("");
  }

  function toggleFav(i){
    allRecs = getRecipients();
    allRecs[i].fav = !allRecs[i].fav;
    saveRecipients(allRecs);
    updateCounts();
    renderRecs(getFilteredRecs(currentFilter));
    showToast(allRecs[i].fav ? "Added to favourites" : "Removed from favourites");
  }

  function payRecipient(i){
    allRecs = getRecipients();
    localStorage.setItem("posb_selected", i);
    window.location = "transfer.html";
  }

  /* ── DISABLED: Quick Transfer does not save any data or change balance ── */
  function quickTransfer(){
    // Fields remain visible and editable; button click is intentionally a no-op.
    return;
  }

  // Init
  updateCounts();
  renderRecs(getFilteredRecs("recent"));
</script>
</body>
</html>
