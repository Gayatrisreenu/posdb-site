  // If already logged in THIS SESSION, redirect
  if(sessionStorage.getItem("posb_login") === "true") {
    window.location = "home.html";
  }

  function doLogin(){
    const userId = document.getElementById("userIdInput").value.trim();
    const pin    = document.getElementById("pinInput").value.trim();

    if(!userId){
      showToast("Please enter your User ID", "error");
      document.getElementById("userIdInput").focus();
      return;
    }
    if(!pin){
      showToast("Please enter your PIN", "error");
      document.getElementById("pinInput").focus();
      return;
    }

    // Store login in sessionStorage (clears when tab/browser closes)
    sessionStorage.setItem("posb_login", "true");
    sessionStorage.setItem("posb_user", userId);
    // Also keep user in localStorage for data persistence
    localStorage.setItem("posb_user", userId);

    // Seed demo data if not already present
    seedDemoData();

    showToast("Logging in…", "success");
    setTimeout(()=>{ window.location = "home.html"; }, 600);
  }

  function hardReset(){

  function showToast(msg, type=""){
